name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Setup
        run: just setup

      - name: Setup conformance
        if: runner.os != 'Windows'
        run: just setup-conformance

      - name: Build
        run: just build

      - name: Generate
        if: runner.os != 'Windows'
        run: just generate && git diff --exit-code

      - name: Test
        run: just test

      - name: Conformance
        if: runner.os != 'Windows'
        run: just conformance
